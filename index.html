<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<title>Alexey Lukiyan</title>
<style>
  /* ===== ШРИФТЫ ===== */
@font-face {
  font-family: 'Magneto';
  src: url('magneto-bold.ttf') format('truetype');
  font-weight: bold;
  font-style: normal; 
}
@font-face {
  font-family: 'Helvetica Neue';
  src: local('HelveticaNeue-Medium.otf');
  font-weight: 500;
}
  @font-face {
  font-family: 'Helvetica';
  src: local('helvetica_regular.otf'), local('helvetica_regular.otf');
  font-weight: 400;
}
  
  /* ===== СБРОС И БАЗОВЫЕ СТИЛИ ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    font-size: 14.4px;
    color: #111;
  }

  /* ===== ЭКРАНЫ (SPA-логика) ===== */
  .screen {
    position: fixed;
    inset: 0;
    display: none;
    opacity: 0;
    transition: opacity 0.35s ease;
  }
  .screen.active {
    display: block;
    opacity: 1;
  }

  /* ===== ФОНОВАЯ КАРТИНКА ===== */
  .bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  /* ===== АВАТАРКА ===== */
  #avatar {
    position: absolute;
    top: 24px;
    left: 24px;
    width: 120px;
    height: 120px;
    object-fit: cover;
    border-radius: 0px;
    z-index: 10;
    cursor: pointer;
  }

  /* ===== КНОПКИ-ПИЛЮЛИ (Alexey Lukiyan / Project / Back) ===== */
  .pill-btn {
    position: absolute;
    z-index: 10;
    border: none;
    cursor: pointer;
    font-family: 'Caveat', cursive;
    font-size: 19.2px;
    font-weight: 600;
    letter-spacing: 0.02em;
    padding: 7.2px 21.6px;
    border-radius: 999px;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    white-space: nowrap;
    user-select: none;
  }

  /* Жёлтая (имя) */
 .pill-yellow {
  width: 192px;
  height: 54px;
  top: 24px;
  left: 150px;
  padding: 0;
  border-radius: 0;
  background: #FEE643;
  color: #282828;
  font-family: 'Magneto', cursive;
  font-size: 16.8px;
  font-weight: bold;        /* было normal */
  line-height: 125%;
  letter-spacing: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  clip-path: polygon(
    12.5% 0%,
    87.5% 0%,
    100% 20%,
    100% 80%,
    87.5% 100%,
    12.5% 100%,
    0% 80%,
    0% 20%
  );
}

  /* Серая (Project / Back) */
  .pill-gray {
    width: 116.4px;
    height: 54px;
    top: 84px;
    left: 188.4px;
    padding: 0;
    background: #282828;
    color: #FFFFFF;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 16.8px;
    font-weight: 500;
    line-height: 125%;
    letter-spacing: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    clip-path: path('M58.2,0 C90.348,0 116.4,0 116.4,27 C116.4,54 90.348,54 58.2,54 C26.052,54 0,54 0,27 C0,0 26.052,0 58.2,0 Z');
  }

  .pill-gray span {
  display: inline-block;
  transform: rotate(-11.65deg) translateY(-2.4px);
}
  
  /* ===== ИНФО-ПЛАШКИ (виджеты) ===== */
  /*
    Все плашки имеют высоту строго 93px.
    Ширину каждого типа задай через отдельный класс ниже.
    overflow-y: auto — скролл при переполнении.
    Перетаскивание — через JS.
  */
  .panel {
    position: absolute;
    height: 111.6px;
    overflow-y: auto;
    overflow-x: hidden;
    background: rgba(255,255,255,0.92);
    border: 1px dashed #aaa;
    padding: 9.6px 12px;
    z-index: 20;
    font-size: 13.2px;
    line-height: 1.5;
    color: #222;
    cursor: grab;
    display: none;
    /* плавное появление */
    opacity: 0;
    transition: opacity 0.25s ease;
  }
  .panel::-webkit-scrollbar { width: 6px; }
  .panel::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4.8px; }
  .panel.visible {
    display: block;
    opacity: 1;
  }
  .panel.dragging { cursor: grabbing; box-shadow: 0 7.2px 28.8px rgba(0,0,0,0.18); }

  /* === Уникальные ширины для каждого типа плашки === */
  /* ширину легко менять — найди нужный класс */
/* === Уникальные ширины для каждого типа плашки === */
.panel--info {
  position: absolute;
  width: 600px;
  height: 120px;
  top: 24px;
  left: 347px !important;
  border: 0.6px dashed #282828;
  background: #fff;
  padding: 0;
  overflow: hidden; /* Скрывает всё, что выходит за пределы */
  
  /* Анимация плавного появления всей плашки (если используется) */
  opacity: 0;
  transition: opacity 0.25s ease, transform 0.1s ease; 
}

/* Этот класс включает видимость плашки */
.panel--info.visible {
  display: block; /* или flex, если нужно, но при absolute позиционировании полосы неважно */
  opacity: 1;
}

.panel--info .info-content {
  box-sizing: border-box;
  width: calc(100% - 14.4px); /* Вычитаем точную ширину полосы, чтобы текст под неё не залезал */
  height: 100%;
  padding: 10.8px 9.6px;
  font-family: 'Helvetica', Arial, sans-serif !important;
  font-size: 12px !important;
  font-weight: 400;
  line-height: 125%;
  letter-spacing: 0;
  color: #282828;
  overflow-y: auto; /* Скролл только для текста */
}

.panel--info .info-content * {
  font-size: 12px !important;
  font-family: 'Helvetica', Arial, sans-serif !important;
  line-height: 125% !important;
}

.panel--info .triangle {
  display: inline-block;
  vertical-align: middle;
  width: 0;
  height: 0;
  border-left: 7.2px solid #282828;
  border-top: 4.2px solid transparent;
  border-bottom: 4.2px solid transparent;
  margin: 0 4.8px 2.4px 0;
}

.panel--info .info-text u {
  text-decoration: underline;
  text-decoration-thickness: 0.36px;
  text-underline-offset: 0.6px;
  text-decoration-skip-ink: auto;
  color: #282828;
}

.panel--info .info-link,
.panel--info .info-link * {
  color: #0000FF !important; /* Гарантирует синий цвет самой ссылке и тексту <u> внутри нее */
  text-decoration: underline;
  text-decoration-thickness: 0.36px;
  text-underline-offset: 0.6px;
  text-decoration-skip-ink: auto;
  cursor: pointer;
}


/* ЖЕСТКОЕ И НАДЕЖНОЕ ПОЗИЦИОНИРОВАНИЕ ПОЛОСЫ */
.panel--info .right-strip {
  position: absolute;
  top: 0;
  right: 0;
  bottom: 0;
  width: 14.4px;
  height: 100%;
  background: #F0F0F0;
  border-left: 0.6px dashed #282828;
  z-index: 5; /* Гарантирует, что полоса всегда будет поверх фонов */
}
/* ===== ПЛАШКА "ПРОЕКТЫ" ===== */
.panel--project {
  position: absolute;
  width: 280px;
  height: 120px;
  border: 0.6px dashed #282828;
  background: #fff;
  padding: 0;
  display: none;
  overflow: hidden;
  opacity: 0;
  transition: opacity 0.25s ease;
  cursor: grab;
  z-index: 20;
}
.panel--project.visible {
  display: flex;
  opacity: 1;
}
.panel--project.dragging {
  cursor: grabbing;
}

.panel--project .cats-block {
  width: 100px;
  height: 120px;
  flex-shrink: 0;
  padding: 10.8px 9.6px;
  font-family: 'Helvetica', Arial, sans-serif;
  font-size: 12px;
  font-weight: 400;
  line-height: 125%;
  letter-spacing: 0;
  color: #282828;
  overflow: hidden;
}

.panel--project .divider {
  width: 6px;
  height: 120px;
  flex-shrink: 0;
  background: #F0F0F0;
  border-left: 0.6px dashed #282828;
  border-right: 0.6px dashed #282828;
}

/* Обёртка для списка проектов + скроллбар-полоса */
.panel--project .projects-block {
  position: relative;
  width: 174px; /* 160 + 14.4 под полосу */
  height: 120px;
  flex-shrink: 0;
  overflow: hidden;
}

/* Сам скроллируемый список */
.panel--project .projects-list {
  position: absolute;
  top: 0;
  left: 0;
  right: 14.4px; /* место под полосу */
  bottom: 0;
  padding: 10.8px 9.6px;
  font-family: 'Helvetica', Arial, sans-serif;
  font-size: 12px;
  font-weight: 400;
  line-height: 125%;
  letter-spacing: 0;
  color: #282828;
  overflow-y: auto;
  scrollbar-width: none; /* прячем системный скролл */
}
.panel--project .projects-list::-webkit-scrollbar {
  display: none;
}

/* Полоса-скроллбар (как right-strip в плашке инфо) */
.panel--project .scroll-strip {
  position: absolute;
  top: 0;
  right: 0;
  bottom: 0;
  width: 16.4px;
  background: #F0F0F0;
  border-left: 0.6px dashed #282828;
  z-index: 5;
}

/* Бегунок внутри полосы */
.panel--project .scroll-thumb {
  position: absolute;
  top: 2px;
  right: 5.2px; /* центрируем 6px внутри полосы 16.4px */
  width: 6px;
  height: 25px !important;
  min-height: 25px;
  background: #A6A6A6;
  border-radius: 12px;
}

/* Пункты списков */
.panel--project .cat-item,
.panel--project .proj-item {
  display: flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
  cursor: pointer;
  padding: 0;
  list-style: none;
}

.panel--project .cat-item span:last-child,
.panel--project .proj-item span:last-child {
  text-decoration: underline;
  text-decoration-thickness: 0.36px;
  text-underline-offset: 0.6px;
  text-decoration-skip-ink: auto;
  color: #282828;
  font-weight: 400;
}
.panel--project .cat-item,
.panel--project .proj-item {
  line-height: 125%;
  font-size: 12px;
  font-family: 'Helvetica', Arial, sans-serif;
}
  
.panel--project .item-triangle {
  flex-shrink: 0;
  display: inline-block;
  width: 0;
  height: 0;
  border-left: 4px solid #282828;
  border-top: 3px solid transparent;
  border-bottom: 3px solid transparent;
  visibility: hidden;
}

.panel--project .cat-item:hover .item-triangle,
.panel--project .cat-item.active .item-triangle,
.panel--project .proj-item:hover .item-triangle,
.panel--project .proj-item.active .item-triangle {
  visibility: visible;
}
  
  /* ===== СТИЛИ ВНУТРИ ПЛАШКИ ПРОЕКТОВ ===== */
  .projects-grid {
    display: flex;
    gap: 0;
  }
  .categories-col {
    min-width: 84px;
    border-right: 1.2px solid #ddd;
    padding-right: 9.6px;
    margin-right: 9.6px;
  }
  .cat-item {
    padding: 1.2px 0;
    cursor: pointer;
    color: #555;
    white-space: nowrap;
  }
  .cat-item:hover { color: #000; }
  .cat-item.active { color: #000; font-weight: 600; }
  .cat-item::before { content: '▸ '; }
  .cat-item.active::before { content: '▸ '; color: #000; }
  .panel--project .cat-item::before { content: none; }
  .panel--project .cat-item.active::before { content: none; }

  .projects-col {
    flex: 1;
    overflow-y: auto;
    max-height: 92.4px;
  }
  .proj-item {
    padding: 1.2px 0;
    cursor: pointer;
    color: #333;
    white-space: nowrap;
  }
  .proj-item:hover { text-decoration: underline; }

/* ===== ПЛАШКА ОПИСАНИЯ ПРОЕКТА ===== */
.panel--desc {
  position: absolute;
  width: 600px;
  height: 120px;
  top: 24px;
  left: 348px;
  border: 0.6px dashed #282828;
  background: #fff;
  padding: 0;
  display: none;
  overflow: hidden;
  opacity: 0;
  transition: opacity 0.25s ease;
  cursor: grab;
  z-index: 20;
}
.panel--desc.visible {
  display: flex;

}
.panel--desc.dragging { cursor: grabbing; }

.panel--desc .desc-content {
  box-sizing: border-box;
  width: calc(100% - 14.4px);
  height: 100%;
  padding: 10.8px 9.6px;
  font-family: 'Helvetica', Arial, sans-serif !important;
  font-size: 12px !important;
  font-weight: 400;
  line-height: 125%;
  letter-spacing: 0;
  color: #282828;
  overflow-y: auto;
  scrollbar-width: none;
}
.panel--desc .desc-content::-webkit-scrollbar { display: none; }

.panel--desc .desc-content * {
  font-size: 12px !important;
  font-family: 'Helvetica', Arial, sans-serif !important;
  line-height: 125% !important;
}

.panel--desc .triangle {
  display: inline-block;
  vertical-align: middle;
  width: 0;
  height: 0;
  border-left: 7.2px solid #282828;
  border-top: 4.2px solid transparent;
  border-bottom: 4.2px solid transparent;
  margin: 0 4.8px 2.4px 0;
}

.panel--desc .right-strip {
  position: absolute;
  top: 0;
  right: 0;
  bottom: 0;
  width: 14.4px;
  background: #F0F0F0;
  border-left: 0.6px dashed #282828;
  z-index: 5;
}

.panel--desc .scroll-thumb-desc {
  position: absolute;
  right: 3.2px;
  width: 8px;
  height: 25px;
  background: #A6A6A6;
  border-radius: 12px;
}

  /* ===== МОБИЛЬНЫЕ СТИЛИ ===== */
  @media (max-width: 640px) {
    #avatar { width: 84px; height: 84px; top: 12px; left: 12px; }
    .pill-yellow { left: 105.6px; top: 12px; font-size: 16.8px; }
    .pill-gray   { left: 105.6px; top: 52.8px; font-size: 15.6px; }

    .panel {
      position: fixed !important;
      left: 12px !important;
      right: 12px !important;
      width: auto !important;
      cursor: default;
    }
    .panel--info  { top: 108px !important; }
    .panel--project { top: 108px !important; }
    .panel--desc  { top: 108px !important; }
    .panel--project { width: 240px; }
.panel--desc    { width: 684px; }

    .thumbs-col {
      flex-direction: row;
      width: auto;
      right: 0; left: 0;
      top: auto;
      bottom: 0;
      height: 96px;
      overflow-x: auto;
      overflow-y: hidden;
    }
    .thumb-img { width: 84px; height: 84px; aspect-ratio: unset; flex-shrink: 0; }
    .main-image-area { right: 19.2px; bottom: 115.2px; top: 240px; }
  }
</style>

          src: "Yofen_1_png.png",
          desc: "Wordmark — the letterforms were drawn by hand and then systematically corrected until they sit at the boundary between childlike spontaneity and professional control."
        }
      ]
    }
  ]
};

// ================================================================
// Все категории (порядок отображения в плашке проектов)
// ================================================================
const CATEGORIES = ["Poster", "Logo", "Website", "Cover", "Other"];
  // ================================================================
// Списки проектов по категориям (для отображения в плашке)
// ================================================================
const PROJECTS_BY_CATEGORY = {
  Poster: ["Yo-fen Festival", "Arche", "Kanugo", "No South Without Boy", "Nostalgia", "Artmercial Games", "Cherry Orchard", "Child", "Routine Escape Zine", "L Galerie", "Ardor Font", "E.P.W.R.F.", "Departament Festival"],
  Logo: ["Yo-fen Festival", "Faccia Cafe", "Rebuilding Creativity", "Nostalgia", "Glam Go", "Objct", "Zerkalo", "Moins de Douleur"],
  Website: ["Baf Buro", "Aprilveahcu", "Liza Klopf Klopf"],
  Cover: ["Sweet Dreams", "Sweet Dreams 2", "Sensee", "Nebo"],
  Other: ["Nostalgia", "5/2", "Faccia cafe", "2029", "Smokers Die Younger", "Luco", "OAO 338", "planer", "Memoire", "If", "Menshechem3", "Emanuel Drugon", "Vengeance"]
};
</script>

<!-- ============================================================ -->
<div id="screen-project" class="screen">
  <div class="bg" id="project-bg"></div>

 <img id="avatar-proj" src="" alt="Avatar"
       style="position:absolute;top:24px;left:24px;width:120px;height:120px;object-fit:cover;border-radius:0px;z-index:10;" />

  <button class="pill-btn pill-yellow" id="btn-name-proj"

<!-- ============================================================ -->
<!-- JS: ЛОГИКА SPA                                               -->
<!-- ============================================================ -->
<script>
// ================================================================
// СОСТОЯНИЕ ПРИЛОЖЕНИЯ
// ================================================================
let state = {
  currentProject: null,  // объект текущего проекта
  currentImage: null,    // индекс текущей картинки (null = не выбрана)
  activeCat: "Poster",   // активная категория в плашке проектов
};

// ================================================================
// УТИЛИТЫ
// ================================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('active');
    s.style.display = 'none';
    s.style.opacity = '0';
  });
  const el = document.getElementById(id);
  el.style.display = 'block';
  requestAnimationFrame(() => {
    el.classList.add('active');
    el.style.opacity = '1';
  });
}

function showPanel(panel) {
  panel.classList.add('visible');
}
function hidePanel(panel) {
  panel.classList.remove('visible');
}
function togglePanel(panel) {
  panel.classList.toggle('visible');
}

// ================================================================
// ПЕРЕТАСКИВАНИЕ ПЛАШЕК (drag)
// Отключается на тач-устройствах — там используется touch
// ================================================================
function makeDraggable(el) {
  let startX, startY, startLeft, startTop;
  const isMobile = () => window.innerWidth <= 640;

  // --- Mouse drag ---
  el.addEventListener('mousedown', e => {
    if (isMobile()) return;
    if (e.button !== 0) return;
    e.preventDefault();
    el.classList.add('dragging');
    const rect = el.getBoundingClientRect();
    startX = e.clientX;
    startY = e.clientY;
    startLeft = rect.left;
    startTop  = rect.top;

    function onMove(e) {
      let newLeft = startLeft + (e.clientX - startX);
      let newTop  = startTop  + (e.clientY - startY);
      // Не даём уйти за пределы экрана
      newLeft = Math.max(0, Math.min(window.innerWidth  - el.offsetWidth,  newLeft));
      newTop  = Math.max(0, Math.min(window.innerHeight - el.offsetHeight, newTop));
      el.style.left = newLeft + 'px';
      el.style.top  = newTop  + 'px';
    }
    function onUp() {
      el.classList.remove('dragging');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup',   onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onUp);
  });

  // --- Touch drag ---
  el.addEventListener('touchstart', e => {
    if (!isMobile()) return;
    const touch = e.touches[0];
    const rect = el.getBoundingClientRect();
    startX = touch.clientX;
    startY = touch.clientY;
    startLeft = rect.left;
    startTop  = rect.top;
  }, { passive: true });

  el.addEventListener('touchmove', e => {
    if (!isMobile()) return;
    e.preventDefault();
    const touch = e.touches[0];
    let newLeft = startLeft + (touch.clientX - startX);
    let newTop  = startTop  + (touch.clientY - startY);
    newLeft = Math.max(0, Math.min(window.innerWidth  - el.offsetWidth,  newLeft));
    newTop  = Math.max(0, Math.min(window.innerHeight - el.offsetHeight, newTop));
    el.style.left = newLeft + 'px';
    el.style.top  = newTop  + 'px';
  }, { passive: false });
}

// ================================================================
// ИНИЦИАЛИЗАЦИЯ ГЛАВНОГО ЭКРАНА
// ================================================================
function initHome() {
  // Фон
  document.getElementById('home-bg').style.backgroundImage = `url('${SITE.bgImage}')`;
  // Аватарка
  document.getElementById('avatar').src = SITE.avatar;
  // Кнопка имени
  document.getElementById('btn-name').textContent = SITE.name;

  // Плашка "Обо мне"
  const panelInfo = document.getElementById('panel-info');
  panelInfo.innerHTML = SITE.about;
  // Начальная позиция плашки (правее кнопки)
  panelInfo.style.top  = '19.2px';
  panelInfo.style.left = '372px';
  makeDraggable(panelInfo);

  // Плашка "Проекты"
  const panelProj = document.getElementById('panel-projects');
  panelProj.style.top  = '60px';
  panelProj.style.left = '372px';
  makeDraggable(panelProj);
  renderProjectsPanel(state.activeCat);

  // --- Кнопки ---
  document.getElementById('btn-name').addEventListener('click', () => {
    // Закрываем проекты, открываем инфо
    hidePanel(panelProj);
    togglePanel(panelInfo);
  });

  document.getElementById('btn-project').addEventListener('click', () => {
    // Закрываем инфо, открываем проекты
    hidePanel(panelInfo);
    togglePanel(panelProj);
  });
}

// ================================================================
// РЕНДЕР ПЛАШКИ ПРОЕКТОВ
// ================================================================
function renderProjectsPanel(activeCat) {
  state.activeCat = activeCat;

  const panelProj = document.getElementById('panel-projects');

  if (!panelProj.querySelector('.cats-block')) {
    panelProj.innerHTML = `
      <div class="cats-block" id="cats-list"></div>
      <div class="divider"></div>
      <div class="projects-block">
        <div class="projects-list" id="proj-list"></div>
        <div class="scroll-strip">
          <div class="scroll-thumb" id="scroll-thumb"></div>
        </div>
      </div>
    `;
  }

  // Категории
  const catsList = document.getElementById('cats-list');
  catsList.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const el = document.createElement('div');
    el.className = 'cat-item' + (cat === activeCat ? ' active' : '');
    el.innerHTML = `<span class="item-triangle"></span><span>${cat}</span>`;
    el.addEventListener('click', e => {
      e.stopPropagation();
      renderProjectsPanel(cat);
    });
    catsList.appendChild(el);
  });

  // Проекты по категории
  const projList = document.getElementById('proj-list');
  projList.innerHTML = '';
  const titles = PROJECTS_BY_CATEGORY[activeCat] || [];
  titles.forEach((title, i) => {
    const el = document.createElement('div');
    el.className = 'proj-item' + (i === 0 ? ' active' : '');
    el.innerHTML = `<span class="item-triangle"></span><span>${title}</span>`;
    el.addEventListener('click', e => {
      e.stopPropagation();
      projList.querySelectorAll('.proj-item').forEach(p => p.classList.remove('active'));
      el.classList.add('active');
      const proj = SITE.projects.find(p => p.title === title);
      if (proj) openProject(proj);
    });
    projList.appendChild(el);
  });
  // Обновляем бегунок скроллбара
  const projListEl = document.getElementById('proj-list');
  const thumb = document.getElementById('scroll-thumb');
  if (thumb && projListEl) {
    const updateThumb = () => {
      const ratio = projListEl.clientHeight / projListEl.scrollHeight;
      const thumbH = 25;
      const thumbTop = (projListEl.scrollTop / projListEl.scrollHeight) * 120;
      thumb.style.height = thumbH + 'px';
      thumb.style.top = thumbTop + 'px';
      thumb.style.display = ratio >= 1 ? 'none' : 'block';
    };
    projListEl.removeEventListener('scroll', projListEl._scrollHandler || null);
    projListEl._scrollHandler = updateThumb;
    projListEl.addEventListener('scroll', updateThumb);
    updateThumb();
  }
}
// ================================================================
// ОТКРЫТЬ ПРОЕКТ
// ================================================================
function openProject(proj) {
  state.currentProject = proj;
  state.currentImage = null;

  // Фон страницы проекта
  const bg = document.getElementById('project-bg');
  if (proj.bg.startsWith('#') || proj.bg.startsWith('rgb')) {
    bg.style.backgroundImage = 'none';
    bg.style.backgroundColor = proj.bg;
  } else {
    bg.style.backgroundImage = `url('${proj.bg}')`;
    bg.style.backgroundColor = '';
  }

  // Аватарка и имя
  document.getElementById('avatar-proj').src = SITE.avatar;
  document.getElementById('btn-name-proj').textContent = SITE.name;

  // Плашка описания проекта
  const panelDesc = document.getElementById('panel-desc');
  const descContent = document.getElementById('desc-content');
  const thumbDesc = document.getElementById('scroll-thumb-desc');

  // Наполняем текстом
  descContent.innerHTML = `
    <div class="triangle"></div>
    <span>${proj.desc}</span>
  `;

  panelDesc.style.top  = '24px';
  panelDesc.style.left = '348px';

  if (!panelDesc._draggable) {
    makeDraggable(panelDesc);
    panelDesc._draggable = true;
  }
  showPanel(panelDesc);

  // Бегунок скролла
  const updateDescThumb = () => {
    const ratio = descContent.clientHeight / descContent.scrollHeight;
    const thumbTop = (descContent.scrollTop / descContent.scrollHeight) * 120;
    thumbDesc.style.top = thumbTop + 'px';
    thumbDesc.style.display = ratio >= 1 ? 'none' : 'block';
  };
  descContent.removeEventListener('scroll', descContent._scrollHandler || null);
  descContent._scrollHandler = updateDescThumb;
  descContent.addEventListener('scroll', updateDescThumb);
  updateDescThumb();

  // Превью картинок
  const thumbsCol = document.getElementById('thumbs-col');
  thumbsCol.innerHTML = '';
  proj.images.forEach((img, i) => {
    const el = document.createElement('img');
    el.className = 'thumb-img';
    el.src = img.src;
    el.alt = `Image ${i+1}`;
    el.addEventListener('click', () => openImage(i));
    thumbsCol.appendChild(el);
  });

  openImage(0);
  document.getElementById('btn-back-images').classList.remove('visible');
  showScreen('screen-project');
}

// ================================================================
// ОТКРЫТЬ КАРТИНКУ (детальный просмотр)
// ================================================================
function openImage(index) {
  const proj = state.currentProject;
  if (!proj) return;
  state.currentImage = index;

  const imgData = proj.images[index];

  // Большая картинка
  const mainImg = document.getElementById('main-image');
  mainImg.style.opacity = '0';
  mainImg.src = imgData.src;
  mainImg.onload = () => { mainImg.style.opacity = '1'; };

  // Обновляем ТОЛЬКО desc-content, не всю плашку
  const descContent = document.getElementById('desc-content');
  if (descContent) {
    descContent.innerHTML = `<div class="triangle"></div><span>${imgData.desc}</span>`;
    descContent.scrollTop = 0;
  }

  // Подсвечиваем активный превью
  document.querySelectorAll('.thumb-img').forEach((el, i) => {
    el.classList.toggle('active', i === index);
  });
}
// ================================================================
// КНОПКИ НАВИГАЦИИ НА СТРАНИЦЕ ПРОЕКТА
// ================================================================
document.getElementById('btn-back').addEventListener('click', () => {
  const panelDesc = document.getElementById('panel-desc');
  panelDesc.classList.remove('visible');
  panelDesc.style.display = 'none';
  panelDesc.style.opacity = '0';

  // Сбрасываем desc-content чтобы не было мусора при следующем открытии
  const descContent = document.getElementById('desc-content');
  if (descContent) descContent.innerHTML = '';

  showScreen('screen-home');

  // Показываем плашку проектов
  const panelProj = document.getElementById('panel-projects');
  panelProj.style.display = 'flex';
  panelProj.classList.add('visible');
  requestAnimationFrame(() => { panelProj.style.opacity = '1'; });
});

document.getElementById('btn-back-images').addEventListener('click', () => {
  const proj = state.currentProject;
  if (!proj) return;
  const descContent = document.getElementById('desc-content');
  if (descContent) {
    descContent.innerHTML = `<div class="triangle"></div><span>${proj.desc}</span>`;
    descContent.scrollTop = 0;
  }
  document.querySelectorAll('.thumb-img').forEach(el => el.classList.remove('active'));
  document.getElementById('btn-back-images').classList.remove('visible');
});

// ================================================================
// СТАРТ
// ================================================================
initHome();
</script>
