<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alexey Lukiyan</title>
<style>
  /* ===== ШРИФТЫ ===== */
@font-face {
  font-family: 'Magneto';
  src: url('magneto-bold.ttf') format('truetype');
  font-weight: bold;
  font-style: normal; 
}
@font-face {
  font-family: 'Helvetica Neue';
  src: local('HelveticaNeue-Medium.otf');
  font-weight: 500;
}
  @font-face {
  font-family: 'Helvetica';
  src: local('helvetica_regular.otf'), local('helvetica_regular.otf');
  font-weight: 400;
}
  
  /* ===== СБРОС И БАЗОВЫЕ СТИЛИ ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    font-size: 14.4px;
  }

  /* ===== ЭКРАНЫ (SPA-логика) ===== */
  .screen {
    position: fixed;
    inset: 0;
    display: none;
    opacity: 0;
    transition: opacity 0.35s ease;
  }
  .screen.active {
    display: block;
    opacity: 1;
  }

  /* ===== ФОНОВАЯ КАРТИНКА ===== */
  .bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  /* ===== АВАТАРКА ===== */
  #avatar {
    position: absolute;
    top: 24px;
    left: 24px;
    width: 120px;
    height: 120px;
    object-fit: cover;
    border-radius: 0px;
    z-index: 10;
    cursor: pointer;
  }

  /* ===== КНОПКИ-ПИЛЮЛИ (Alexey Lukiyan / Project / Back) ===== */
  .pill-btn {
    position: absolute;
    z-index: 10;
    border: none;
    cursor: pointer;
    font-family: 'Caveat', cursive;
    font-size: 19.2px;
    font-weight: 600;
    letter-spacing: 0.02em;
    padding: 7.2px 21.6px;
    border-radius: 999px;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    white-space: nowrap;
    user-select: none;
  }

  /* Жёлтая (имя) */
 .pill-yellow {
  width: 192px;
  height: 54px;
  top: 24px;
  left: 150px;
  padding: 0;
  border-radius: 0;
  background: #FEE643;
  color: #282828;
  font-family: 'Magneto', cursive;
  font-size: 16.8px;
  font-weight: bold;        /* было normal */
  line-height: 125%;
  letter-spacing: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  clip-path: polygon(
    12.5% 0%,
    87.5% 0%,
    100% 20%,
    100% 80%,
    87.5% 100%,
    12.5% 100%,
    0% 80%,
    0% 20%
  );
}

  /* Серая (Project / Back) */
  .pill-gray {
    width: 116.4px;
    height: 54px;
    top: 84px;
    left: 188.4px;
    padding: 0;
    background: #282828;
    color: #FFFFFF;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 16.8px;
    font-weight: 500;
    line-height: 125%;
    letter-spacing: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    clip-path: path('M58.2,0 C90.348,0 116.4,0 116.4,27 C116.4,54 90.348,54 58.2,54 C26.052,54 0,54 0,27 C0,0 26.052,0 58.2,0 Z');
  }

  .pill-gray span {
  display: inline-block;
  transform: rotate(-11.65deg) translateY(-2.4px);
}
  
  /* ===== ИНФО-ПЛАШКИ (виджеты) ===== */
  /*
    Все плашки имеют высоту строго 93px.
    Ширину каждого типа задай через отдельный класс ниже.
    overflow-y: auto — скролл при переполнении.
    Перетаскивание — через JS.
  */
  .panel {
    position: absolute;
    height: 111.6px;
    overflow-y: auto;
    overflow-x: hidden;
    background: rgba(255,255,255,0.92);
    border: 1px dashed #aaa;
    padding: 9.6px 12px;
    z-index: 20;
    font-size: 13.2px;
    line-height: 1.5;
    color: #222;
    cursor: grab;
    display: none;
    /* плавное появление */
    opacity: 0;
    transition: opacity 0.25s ease;
    /* тонкий скроллбар */
    scrollbar-width: thin;
    scrollbar-color: #bbb transparent;
  }
  .panel::-webkit-scrollbar { width: 6px; }
  .panel::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4.8px; }
  .panel.visible {
    display: block;
    opacity: 1;
  }
  .panel.dragging { cursor: grabbing; box-shadow: 0 7.2px 28.8px rgba(0,0,0,0.18); }

  /* === Уникальные ширины для каждого типа плашки === */
  /* ширину легко менять — найди нужный класс */
.panel--info {
  position: absolute;
  width: 600px;
  height: 120px;
  top: 24px;
  left: 348px;
  border: 0.6px dashed #282828;
  background: #fff;
  padding: 0;
  display: flex;
  flex-direction: row;
  overflow: hidden;
}

.panel--info .info-content {
  flex: 1 1 auto;
  padding: 10.8px 9.6px;
  font-family: 'Helvetica', Arial, sans-serif !important;
  font-size: 12px !important;
  font-weight: 400;
  line-height: 125%;
  letter-spacing: 0;
  color: #282828;
  overflow-y: auto;
}

.panel--info .info-content * {
  font-size: 12px !important;
  font-family: 'Helvetica', Arial, sans-serif !important;
  line-height: 125% !important;
}

.panel--info .triangle {
  float: left;
  width: 0;
  height: 0;
  border-left: 7.2px solid #282828;
  border-top: 4.2px solid transparent;
  border-bottom: 4.2px solid transparent;
  margin: 2.4px 4.8px 0 0;
}

.panel--info .info-text u {
  text-decoration: underline;
  text-decoration-thickness: 0.36px;
  text-underline-offset: 0.6px;
  text-decoration-skip-ink: auto;
  color: #282828;
}

.panel--info .info-link {
  color: #0000FF;
  text-decoration: underline;
  text-decoration-thickness: 0.36px;
  text-underline-offset: 0.6px;
  text-decoration-skip-ink: auto;
  cursor: pointer;
}

.panel--info .right-strip {
  width: 14.4px;
  height: 100%;
  flex-shrink: 0;
  background: #F0F0F0;
  border-left: 0.6px dashed #282828;
}
  /* ===== СТИЛИ ВНУТРИ ПЛАШКИ ПРОЕКТОВ ===== */
  .projects-grid {
    display: flex;
    gap: 0;
  }
  .categories-col {
    min-width: 84px;
    border-right: 1.2px solid #ddd;
    padding-right: 9.6px;
    margin-right: 9.6px;
  }
  .cat-item {
    padding: 1.2px 0;
    cursor: pointer;
    color: #555;
    white-space: nowrap;
  }
  .cat-item:hover { color: #000; }
  .cat-item.active { color: #000; font-weight: 600; }
  .cat-item::before { content: '▸ '; }
  .cat-item.active::before { content: '▸ '; color: #000; }

  .projects-col {
    flex: 1;
    overflow-y: auto;
    max-height: 92.4px;
  }
  .proj-item {
    padding: 1.2px 0;
    cursor: pointer;
    color: #333;
    white-space: nowrap;
  }
  .proj-item:hover { text-decoration: underline; }

  /* ===== СТРАНИЦА ПРОЕКТА ===== */
  #screen-project .bg,
  #screen-image .bg {
    background-color: #fff;
  }

  /* Колонка превью справа */
  .thumbs-col {
    position: absolute;
    right: 19.2px;
    top: 19.2px;
    bottom: 19.2px;
    width: 192px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 9.6px;
    z-index: 10;
    scrollbar-width: thin;
    scrollbar-color: #ccc transparent;
  }
  .thumbs-col::-webkit-scrollbar { width: 4.8px; }
  .thumbs-col::-webkit-scrollbar-thumb { background: #ccc; }

  .thumb-img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    cursor: pointer;
    border: 2.4px solid transparent;
    transition: border-color 0.15s;
    border-radius: 2.4px;
  }
  .thumb-img:hover { border-color: #F5E642; }
  .thumb-img.active { border-color: #111; }

  /* Главная картинка проекта (центр экрана) */
  .main-image-area {
    position: absolute;
    left: 19.2px;
    right: 230.4px; /* 192px колонка + 19.2*2 */
    top: 156px;
    bottom: 19.2px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .main-image-area img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    transition: opacity 0.2s ease;
  }

  /* Кнопка "Back to images" */
  .back-images-btn {
    position: absolute;
    bottom: 19.2px;
    left: 19.2px;
    z-index: 15;
    background: #F5E642;
    border: none;
    border-radius: 999px;
    font-family: 'Caveat', cursive;
    font-size: 16.8px;
    font-weight: 600;
    padding: 6px 16.8px;
    cursor: pointer;
    display: none;
  }
  .back-images-btn.visible { display: block; }

  /* ===== МОБИЛЬНЫЕ СТИЛИ ===== */
  @media (max-width: 640px) {
    #avatar { width: 84px; height: 84px; top: 12px; left: 12px; }
    .pill-yellow { left: 105.6px; top: 12px; font-size: 16.8px; }
    .pill-gray   { left: 105.6px; top: 52.8px; font-size: 15.6px; }

    .panel {
      position: fixed !important;
      left: 12px !important;
      right: 12px !important;
      width: auto !important;
      cursor: default;
    }
    .panel--info  { top: 108px !important; }
    .panel--project { top: 108px !important; }
    .panel--desc  { top: 108px !important; }
    .panel--project { width: 240px; }
.panel--desc    { width: 684px; }

    .thumbs-col {
      flex-direction: row;
      width: auto;
      right: 0; left: 0;
      top: auto;
      bottom: 0;
      height: 96px;
      overflow-x: auto;
      overflow-y: hidden;
    }
    .thumb-img { width: 84px; height: 84px; aspect-ratio: unset; flex-shrink: 0; }
    .main-image-area { right: 19.2px; bottom: 115.2px; top: 240px; }
  }
</style>
</head>
<body>
