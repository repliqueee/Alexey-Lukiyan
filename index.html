<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alexey Lukiyan</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap');

  @font-face {
    font-family: 'Magneto';
    src: url('magneto-bold.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    color: #111;
    background: #000;
  }

  .screen {
    position: fixed;
    inset: 0;
    display: none;
    opacity: 0;
    transition: opacity 0.35s ease;
  }
  .screen.active { display: block; opacity: 1; }

  .bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  #avatar,
  #avatar-proj {
    position: absolute;
    top: 20px;
    left: 20px;
    width: 100px;
    height: 100px;
    object-fit: cover;
    border-radius: 0;
    z-index: 10;
    cursor: pointer;
  }

  .pill-btn {
    position: absolute;
    z-index: 10;
    border: none;
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    white-space: nowrap;
    user-select: none;
  }
  .pill-btn:hover { transform: scale(1.04); }
  .pill-btn:active { transform: scale(0.97); }

  .pill-yellow {
    width: 160px;
    height: 45px;
    top: 20px;
    left: 125px;
    padding: 0;
    border-radius: 0;
    background: #F5E642;
    color: #111;
    font-family: 'Magneto', cursive;
    font-size: 14px;
    font-weight: normal;
    line-height: 125%;
    letter-spacing: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    clip-path: polygon(5% 0%, 95% 0%, 100% 50%, 95% 100%, 5% 100%, 0% 50%);
    -webkit-clip-path: polygon(5% 0%, 95% 0%, 100% 50%, 95% 100%, 5% 100%, 0% 50%);
  }

  .pill-gray {
    background: #282828;
    color: #FFFFFF;
    font-family: 'Magneto', cursive;
    font-size: 14px;
    line-height: 125%;
    letter-spacing: 0;
    padding: 6px 18px;
    border-radius: 999px;
    top: 70px;
    left: 157px;
  }

  .panel {
    position: absolute;
    height: 93px;
    overflow-y: auto;
    overflow-x: hidden;
    background: rgba(255,255,255,0.92);
    border: 1px dashed #aaa;
    padding: 8px 10px;
    z-index: 20;
    font-size: 11px;
    line-height: 1.5;
    color: #222;
    cursor: grab;
    display: none;
    opacity: 0;
    transition: opacity 0.25s ease;
    scrollbar-width: thin;
    scrollbar-color: #bbb transparent;
  }
  .panel::-webkit-scrollbar { width: 5px; }
  .panel::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
  .panel.visible { display: block; opacity: 1; }
  .panel.dragging { cursor: grabbing; box-shadow: 0 6px 24px rgba(0,0,0,0.18); }

  .panel--info    { width: 380px; }
  .panel--project { width: 200px; }
  .panel--desc    { width: 570px; }

  .projects-grid { display: flex; gap: 0; }
  .categories-col {
    min-width: 70px;
    border-right: 1px solid #ddd;
    padding-right: 8px;
    margin-right: 8px;
  }
  .cat-item { padding: 1px 0; cursor: pointer; color: #555; white-space: nowrap; }
  .cat-item:hover { color: #000; }
  .cat-item.active { color: #000; font-weight: 600; }
  .cat-item::before { content: '▸ '; }
  .projects-col { flex: 1; overflow-y: auto; max-height: 77px; }
  .proj-item { padding: 1px 0; cursor: pointer; color: #333; white-space: nowrap; }
  .proj-item:hover { text-decoration: underline; }

  .info-lead { display: flex; gap: 4px; margin-bottom: 4px; }
  .info-lead::before { content: '▸'; flex-shrink: 0; }
  .info-text { flex: 1; }
  .info-link { display: block; margin-top: 6px; color: #1a6aff; text-decoration: underline; cursor: pointer; }

  #screen-project .bg { background-color: #fff; }

  .thumbs-col {
    position: absolute;
    right: 16px; top: 16px; bottom: 16px;
    width: 160px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 10;
  }
  .thumb-img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.15s;
    border-radius: 2px;
  }
  .thumb-img:hover { border-color: #F5E642; }
  .thumb-img.active { border-color: #111; }

  .main-image-area {
    position: absolute;
    left: 16px; right: 192px; top: 130px; bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .main-image-area img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    transition: opacity 0.2s ease;
  }

  .back-images-btn {
    position: absolute;
    bottom: 16px; left: 16px;
    z-index: 15;
    background: #F5E642;
    border: none;
    border-radius: 999px;
    font-family: 'Magneto', cursive;
    font-size: 14px;
    padding: 5px 14px;
    cursor: pointer;
    display: none;
  }
  .back-images-btn.visible { display: block; }

  @media (max-width: 640px) {
    #avatar, #avatar-proj { width: 70px; height: 70px; top: 10px; left: 10px; }
    .pill-yellow { left: 88px; top: 10px; width: 160px; height: 45px; }
    .pill-gray { left: 88px; top: 60px; }
    .panel { position: fixed !important; left: 10px !important; right: 10px !important; width: auto !important; }
    .panel--info, .panel--project, .panel--desc { top: 90px !important; }
  }
</style>
</head>
