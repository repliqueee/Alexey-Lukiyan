<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alexey Lukiyan</title>
<style>
  /* ===== ШРИФТЫ ===== */
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Inter:wght@400;500&display=swap');
  @font-face {
  font-family: 'Magneto';
  src: url('Magneto.ttf') format('truetype');
  font-weight: normal;
  font-style: normal;
}

  /* ===== СБРОС И БАЗОВЫЕ СТИЛИ ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    color: #111;
    background: #000;
  }

  /* ===== ЭКРАНЫ (SPA-логика) ===== */
  .screen {
    position: fixed;
    inset: 0;
    display: none;
    opacity: 0;
    transition: opacity 0.35s ease;
  }
  .screen.active {
    display: block;
    opacity: 1;
  }

  /* ===== ФОНОВАЯ КАРТИНКА ===== */
  .bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
  }

  /* ===== АВАТАРКА ===== */
  #avatar {
    position: absolute;
    top: 20px;
    left: 20px;
    width: 100px;
    height: 100px;
    object-fit: cover;
    border-radius: 0px;
    z-index: 10;
    cursor: pointer;
  }

  /* ===== КНОПКИ-ПИЛЮЛИ (Alexey Lukiyan / Project / Back) ===== */
  .pill-btn {
    position: absolute;
    z-index: 10;
    border: none;
    cursor: pointer;
    font-family: 'Caveat', cursive;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.02em;
    padding: 6px 18px;
    border-radius: 999px;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    white-space: nowrap;
    user-select: none;
  }
  .pill-btn:hover { transform: scale(1.04); }
  .pill-btn:active { transform: scale(0.97); }

  /* Жёлтая (имя) */
 .pill-yellow {
  width: 160px;
  height: 45px;
  top: 20px;
  left: 125px;
  padding: 0;
  border-radius: 0;
  background: #F5E642;
  color: #111;
  font-family: 'Magneto', cursive;
  font-size: 14px;
  font-weight: normal;
  line-height: 125%;
  letter-spacing: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  clip-path: polygon(8% 0%, 92% 0%, 100% 50%, 92% 100%, 8% 100%, 0% 50%);
}

  /* Серая (Project / Back) */
  .pill-gray {
    background: #E0E0E0;
    color: #111;
    top: 50px; /* 16px + ~28px высота жёлтой + 5px */
    left: 124px;
  }

  /* ===== ИНФО-ПЛАШКИ (виджеты) ===== */
  /*
    Все плашки имеют высоту строго 93px.
    Ширину каждого типа задай через отдельный класс ниже.
    overflow-y: auto — скролл при переполнении.
    Перетаскивание — через JS.
  */
  .panel {
    position: absolute;
    height: 93px;
    overflow-y: auto;
    overflow-x: hidden;
    background: rgba(255,255,255,0.92);
    border: 1px dashed #aaa;
    padding: 8px 10px;
    z-index: 20;
    font-size: 11px;
    line-height: 1.5;
    color: #222;
    cursor: grab;
    display: none;
    /* плавное появление */
    opacity: 0;
    transition: opacity 0.25s ease;
    /* тонкий скроллбар */
    scrollbar-width: thin;
    scrollbar-color: #bbb transparent;
  }
  .panel::-webkit-scrollbar { width: 5px; }
  .panel::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
  .panel.visible {
    display: block;
    opacity: 1;
  }
  .panel.dragging { cursor: grabbing; box-shadow: 0 6px 24px rgba(0,0,0,0.18); }

  /* === Уникальные ширины для каждого типа плашки === */
  /* ширину легко менять — найди нужный класс */
  .panel--info    { width: 380px; } /* плашка "Обо мне" */
  .panel--project { width: 200px; } /* плашка "Проекты" */
  .panel--desc    { width: 570px; } /* плашка с описанием проекта / картинки */

  /* ===== СТИЛИ ВНУТРИ ПЛАШКИ ПРОЕКТОВ ===== */
  .projects-grid {
    display: flex;
    gap: 0;
  }
  .categories-col {
    min-width: 70px;
    border-right: 1px solid #ddd;
    padding-right: 8px;
    margin-right: 8px;
  }
  .cat-item {
    padding: 1px 0;
    cursor: pointer;
    color: #555;
    white-space: nowrap;
  }
  .cat-item:hover { color: #000; }
  .cat-item.active { color: #000; font-weight: 600; }
  .cat-item::before { content: '▸ '; }
  .cat-item.active::before { content: '▸ '; color: #000; }

  .projects-col {
    flex: 1;
    overflow-y: auto;
    max-height: 77px;
  }
  .proj-item {
    padding: 1px 0;
    cursor: pointer;
    color: #333;
    white-space: nowrap;
  }
  .proj-item:hover { text-decoration: underline; }

  /* ===== СТИЛИ ПЛАШКИ "ИНФО" ===== */
  .info-lead {
    display: flex;
    gap: 4px;
    margin-bottom: 4px;
  }
  .info-lead::before { content: '▸'; flex-shrink: 0; margin-top: 0; }
  .info-text { flex: 1; }
  .info-link {
    display: block;
    margin-top: 6px;
    color: #1a6aff;
    text-decoration: underline;
    cursor: pointer;
  }

  /* ===== СТРАНИЦА ПРОЕКТА ===== */
  #screen-project .bg,
  #screen-image .bg {
    background-color: #fff;
  }

  /* Колонка превью справа */
  .thumbs-col {
    position: absolute;
    right: 16px;
    top: 16px;
    bottom: 16px;
    width: 160px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 10;
    scrollbar-width: thin;
    scrollbar-color: #ccc transparent;
  }
  .thumbs-col::-webkit-scrollbar { width: 4px; }
  .thumbs-col::-webkit-scrollbar-thumb { background: #ccc; }

  .thumb-img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.15s;
    border-radius: 2px;
  }
  .thumb-img:hover { border-color: #F5E642; }
  .thumb-img.active { border-color: #111; }

  /* Главная картинка проекта (центр экрана) */
  .main-image-area {
    position: absolute;
    left: 16px;
    right: 192px; /* 160px колонка + 16*2 */
    top: 130px;
    bottom: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .main-image-area img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    transition: opacity 0.2s ease;
  }

  /* Кнопка "Back to images" */
  .back-images-btn {
    position: absolute;
    bottom: 16px;
    left: 16px;
    z-index: 15;
    background: #F5E642;
    border: none;
    border-radius: 999px;
    font-family: 'Caveat', cursive;
    font-size: 14px;
    font-weight: 600;
    padding: 5px 14px;
    cursor: pointer;
    display: none;
  }
  .back-images-btn.visible { display: block; }

  /* ===== МОБИЛЬНЫЕ СТИЛИ ===== */
  @media (max-width: 640px) {
    #avatar { width: 70px; height: 70px; top: 10px; left: 10px; }
    .pill-yellow { left: 88px; top: 10px; font-size: 14px; }
    .pill-gray   { left: 88px; top: 44px; font-size: 13px; }

    .panel {
      position: fixed !important;
      left: 10px !important;
      right: 10px !important;
      width: auto !important;
      cursor: default;
    }
    .panel--info  { top: 90px !important; }
    .panel--project { top: 90px !important; }
    .panel--desc  { top: 90px !important; }

    .thumbs-col {
      flex-direction: row;
      width: auto;
      right: 0; left: 0;
      top: auto;
      bottom: 0;
      height: 80px;
      overflow-x: auto;
      overflow-y: hidden;
    }
    .thumb-img { width: 70px; height: 70px; aspect-ratio: unset; flex-shrink: 0; }
    .main-image-area { right: 16px; bottom: 96px; top: 200px; }
  }
</style>

<script>
// ================================================================
// СОСТОЯНИЕ ПРИЛОЖЕНИЯ
// ================================================================
let state = {
  currentProject: null,  // объект текущего проекта
  currentImage: null,    // индекс текущей картинки (null = не выбрана)
  activeCat: "Poster",   // активная категория в плашке проектов
};

// ================================================================
// УТИЛИТЫ
// ================================================================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('active');
    s.style.display = 'none';
    s.style.opacity = '0';
  });
  const el = document.getElementById(id);
  el.style.display = 'block';
  requestAnimationFrame(() => {
    el.classList.add('active');
    el.style.opacity = '1';
  });
}

function showPanel(panel) {
  panel.classList.add('visible');
}
function hidePanel(panel) {
  panel.classList.remove('visible');
}
function togglePanel(panel) {
  panel.classList.toggle('visible');
}

// ================================================================
// ПЕРЕТАСКИВАНИЕ ПЛАШЕК (drag)
// Отключается на тач-устройствах — там используется touch
// ================================================================
function makeDraggable(el) {
  let startX, startY, startLeft, startTop;
  const isMobile = () => window.innerWidth <= 640;

  // --- Mouse drag ---
  el.addEventListener('mousedown', e => {
    if (isMobile()) return;
    if (e.button !== 0) return;
    e.preventDefault();
    el.classList.add('dragging');
    const rect = el.getBoundingClientRect();
    startX = e.clientX;
    startY = e.clientY;
    startLeft = rect.left;
    startTop  = rect.top;

    function onMove(e) {
      let newLeft = startLeft + (e.clientX - startX);
      let newTop  = startTop  + (e.clientY - startY);
      // Не даём уйти за пределы экрана
      newLeft = Math.max(0, Math.min(window.innerWidth  - el.offsetWidth,  newLeft));
      newTop  = Math.max(0, Math.min(window.innerHeight - el.offsetHeight, newTop));
      el.style.left = newLeft + 'px';
      el.style.top  = newTop  + 'px';
    }
    function onUp() {
      el.classList.remove('dragging');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup',   onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onUp);
  });

  // --- Touch drag ---
  el.addEventListener('touchstart', e => {
    if (!isMobile()) return;
    const touch = e.touches[0];
    const rect = el.getBoundingClientRect();
    startX = touch.clientX;
    startY = touch.clientY;
    startLeft = rect.left;
    startTop  = rect.top;
  }, { passive: true });

  el.addEventListener('touchmove', e => {
    if (!isMobile()) return;
    e.preventDefault();
    const touch = e.touches[0];
    let newLeft = startLeft + (touch.clientX - startX);
    let newTop  = startTop  + (touch.clientY - startY);
    newLeft = Math.max(0, Math.min(window.innerWidth  - el.offsetWidth,  newLeft));
    newTop  = Math.max(0, Math.min(window.innerHeight - el.offsetHeight, newTop));
    el.style.left = newLeft + 'px';
    el.style.top  = newTop  + 'px';
  }, { passive: false });
}

// ================================================================
// ИНИЦИАЛИЗАЦИЯ ГЛАВНОГО ЭКРАНА
// ================================================================
function initHome() {
  // Фон
  document.getElementById('home-bg').style.backgroundImage = `url('${SITE.bgImage}')`;
  // Аватарка
  document.getElementById('avatar').src = SITE.avatar;
  // Кнопка имени
  document.getElementById('btn-name').textContent = SITE.name;

  // Плашка "Обо мне"
  const panelInfo = document.getElementById('panel-info');
  panelInfo.innerHTML = SITE.about;
  // Начальная позиция плашки (правее кнопки)
  panelInfo.style.top  = '16px';
  panelInfo.style.left = '310px';
  makeDraggable(panelInfo);

  // Плашка "Проекты"
  const panelProj = document.getElementById('panel-projects');
  panelProj.style.top  = '50px';
  panelProj.style.left = '310px';
  makeDraggable(panelProj);
  renderProjectsPanel(state.activeCat);

  // --- Кнопки ---
  document.getElementById('btn-name').addEventListener('click', () => {
    // Закрываем проекты, открываем инфо
    hidePanel(panelProj);
    togglePanel(panelInfo);
  });

  document.getElementById('btn-project').addEventListener('click', () => {
    // Закрываем инфо, открываем проекты
    hidePanel(panelInfo);
    togglePanel(panelProj);
  });
}

// ================================================================
// РЕНДЕР ПЛАШКИ ПРОЕКТОВ
// ================================================================
function renderProjectsPanel(activeCat) {
  state.activeCat = activeCat;

  // Категории
  const catsList = document.getElementById('cats-list');
  catsList.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const el = document.createElement('div');
    el.className = 'cat-item' + (cat === activeCat ? ' active' : '');
    el.textContent = cat;
    el.addEventListener('click', e => {
      e.stopPropagation();
      renderProjectsPanel(cat);
    });
    catsList.appendChild(el);
  });

  // Проекты по категории
  const projList = document.getElementById('proj-list');
  projList.innerHTML = '';
  const filtered = SITE.projects.filter(p => p.category === activeCat);
  filtered.forEach(proj => {
    const el = document.createElement('div');
    el.className = 'proj-item';
    el.textContent = proj.title;
    el.addEventListener('click', e => {
      e.stopPropagation();
      openProject(proj);
    });
    projList.appendChild(el);
  });
}

// ================================================================
// ОТКРЫТЬ ПРОЕКТ
// ================================================================
function openProject(proj) {
  state.currentProject = proj;
  state.currentImage = null;

  // Фон страницы проекта
  const bg = document.getElementById('project-bg');
  if (proj.bg.startsWith('#') || proj.bg.startsWith('rgb')) {
    bg.style.backgroundImage = 'none';
    bg.style.backgroundColor = proj.bg;
  } else {
    bg.style.backgroundImage = `url('${proj.bg}')`;
    bg.style.backgroundColor = '';
  }

  // Аватарка и имя
  document.getElementById('avatar-proj').src = SITE.avatar;
  document.getElementById('btn-name-proj').textContent = SITE.name;

  // Плашка описания проекта
  const panelDesc = document.getElementById('panel-desc');
  panelDesc.innerHTML = proj.desc;
  panelDesc.style.top  = '16px';
  panelDesc.style.left = '230px';
  if (!panelDesc._draggable) {
    makeDraggable(panelDesc);
    panelDesc._draggable = true;
  }
  showPanel(panelDesc);

  // Превью картинок
  const thumbsCol = document.getElementById('thumbs-col');
  thumbsCol.innerHTML = '';
  proj.images.forEach((img, i) => {
    const el = document.createElement('img');
    el.className = 'thumb-img';
    el.src = img.src;
    el.alt = `Image ${i+1}`;
    el.addEventListener('click', () => openImage(i));
    thumbsCol.appendChild(el);
  });

  // Главная картинка — первая по умолчанию
  openImage(0);

  // Кнопка Back
  document.getElementById('btn-back-images').classList.remove('visible');

  showScreen('screen-project');
}

// ================================================================
// ОТКРЫТЬ КАРТИНКУ (детальный просмотр)
// ================================================================
function openImage(index) {
  const proj = state.currentProject;
  if (!proj) return;
  state.currentImage = index;

  const imgData = proj.images[index];

  // Большая картинка
  const mainImg = document.getElementById('main-image');
  mainImg.style.opacity = '0';
  mainImg.src = imgData.src;
  mainImg.onload = () => { mainImg.style.opacity = '1'; };

  // Обновляем плашку: описание ЭТОЙ картинки
  const panelDesc = document.getElementById('panel-desc');
  panelDesc.innerHTML = imgData.desc;
  panelDesc.scrollTop = 0;

  // Подсвечиваем активный превью
  document.querySelectorAll('.thumb-img').forEach((el, i) => {
    el.classList.toggle('active', i === index);
  });
}

// ================================================================
// КНОПКИ НАВИГАЦИИ НА СТРАНИЦЕ ПРОЕКТА
// ================================================================
document.getElementById('btn-back').addEventListener('click', () => {
  // Возврат на главную (восстанавливаем плашку проектов открытой)
  const panelDesc = document.getElementById('panel-desc');
  hidePanel(panelDesc);
  showScreen('screen-home');
  // Показываем плашку проектов снова
  showPanel(document.getElementById('panel-projects'));
});

document.getElementById('btn-back-images').addEventListener('click', () => {
  // Сбросить выбранную картинку, показать описание проекта
  const proj = state.currentProject;
  if (!proj) return;
  const panelDesc = document.getElementById('panel-desc');
  panelDesc.innerHTML = proj.desc;
  panelDesc.scrollTop = 0;
  document.querySelectorAll('.thumb-img').forEach(el => el.classList.remove('active'));
  document.getElementById('btn-back-images').classList.remove('visible');
});

// ================================================================
// СТАРТ
// ================================================================
initHome();
</script>
